<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Jorge Moreira</title>
    <script>
      // SPA redirect for GitHub Pages
      // Encodes the path/query/hash into a query string so GitHub's 404 page
      // redirects back to index.html, which decodes it and restores the URL.
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1).join('/') +
        '/?p=' + encodeURIComponent(l.pathname + l.search) +
        (l.hash ? '&h=' + encodeURIComponent(l.hash) : '')
      );
    </script>
  </head>
  <body></body>
</html>
